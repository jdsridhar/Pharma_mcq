name: pharmacy-mcq

# Local development stack. Copy `.env.example` to `.env` first.
# Datastores are exposed on localhost so the API can also be run directly (pnpm dev)
# without containers. The `api`/`web` services are for full containerized runs.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pharmacy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacy}
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy_mcq}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pharmacy} -d ${POSTGRES_DB:-pharmacy_mcq}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # One-shot: create the media bucket on first boot.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do sleep 1; done;
      mc mb -p local/${S3_BUCKET:-pharmacy-media} || true;
      mc anonymous set download local/${S3_BUCKET:-pharmacy-media} || true;
      exit 0;
      "

  # Local SMTP capture; UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pharmacy}:${POSTGRES_PASSWORD:-pharmacy}@postgres:5432/${POSTGRES_DB:-pharmacy_mcq}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      APP_WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  pgdata:
  redisdata:
  miniodata:
